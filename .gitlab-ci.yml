stages:
  - test
  - build
  - deploy

variables:
  AWS_REGION: "us-east-2"
  ECR_REPOSITORY: "319426459497.dkr.ecr.us-east-2.amazonaws.com/portfolio-api"
  ECS_CLUSTER: "default"
  ECS_SERVICE: "portfolio-api-5b60"

unit-tests:
  stage: test
  image: amazoncorretto:26-alpine
  script:
    - chmod +x ./mvnw
    - ./mvnw -B test

build-image:
  stage: build
  needs:
    - unit-tests
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - apk add --no-cache aws-cli python3
  script:
    - echo "Authenticating with AWS ECR..."
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY
    - echo "Building the Java 26 Docker image..."
    - docker build -t $ECR_REPOSITORY:latest .
    - echo "Pushing image to the cloud vault..."
    - docker push $ECR_REPOSITORY:latest

deploy-ecs:
  stage: deploy
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs:
    - build-image
  script:
    - echo "Telling ECS to pull the new image and restart the server..."
    - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment
    - echo "Waiting for ECS service to stabilize..."
    - aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE
    - python3 scripts/smoke-api.py
